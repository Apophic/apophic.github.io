<!DOCTYPE html>
<html>
<head>
    <title>Text Submission</title>
</head>
<body>
    <h1>Submit Text</h1>
    <form id="textForm" method="POST">
        <textarea id="user_input" name="user_input" rows="4" cols="50" placeholder="Enter your text here"></textarea><br><br>
        <input type="submit" value="Submit">
    </form>

    <script>
        document.getElementById("textForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent the form from submitting the traditional way

            // Get the user's input
            var userInput = document.getElementById("user_input").value;

            // Define your Discord webhook URL
            var webhookUrl = "https://discord.com/api/webhooks/1156573477894103082/mJosRwNo7bx-1Ithy22tCEAvl6tL2bBpIubO9aCGMLVM-gO5SiCs3LvPZn9XyV7PYo72"; // Replace with your webhook URL

            // Create a data object to send to the webhook
            var data = {
                content: userInput
            };

            // Send a POST request to the Discord webhook
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    alert("Text submitted successfully!");
                } else {
                    alert("Failed to submit text.");
                }
            })
            .catch(error => {
                console.error("Error:", error);
            });
        });
    </script>
</body>
</html>
